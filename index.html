<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Despesas com Firebase</title>
    <style>
        /* (mesmo estilo anterior, mantido por brevidade) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); padding: 25px; }
        h1 { color: #2c3e50; margin-bottom: 25px; font-weight: 600; border-left: 6px solid #3498db; padding-left: 15px; }
        .form-card { background: #f8fafc; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1 1 200px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #334155; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; transition: border 0.2s; }
        .form-group input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.2); }
        .btn { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: #2980b9; }
        .btn-secondary { background: #94a3b8; }
        .btn-secondary:hover { background: #64748b; }
        .filter-section { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 20px; margin-bottom: 25px; background: #ffffff; padding: 15px 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .filter-date { flex: 1 1 250px; }
        .totals { display: flex; flex-wrap: wrap; gap: 25px; margin-bottom: 25px; }
        .total-box { background: linear-gradient(145deg, #ffffff, #f1f5f9); border-radius: 16px; padding: 20px 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1 1 200px; border: 1px solid #d1d9e6; }
        .total-box span { display: block; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #475569; margin-bottom: 8px; }
        .total-box .value { font-size: 2.2rem; font-weight: 700; color: #0f172a; }
        .total-box .value small { font-size: 1rem; font-weight: 400; color: #64748b; }
        .expenses-list { background: #ffffff; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; }
        .list-header { display: grid; grid-template-columns: 3fr 1fr 2fr 1.5fr 0.5fr; background: #f1f5f9; padding: 15px 20px; font-weight: 600; color: #334155; border-bottom: 2px solid #cbd5e1; }
        .expense-item { display: grid; grid-template-columns: 3fr 1fr 2fr 1.5fr 0.5fr; padding: 15px 20px; align-items: center; border-bottom: 1px solid #e2e8f0; transition: background 0.1s; }
        .expense-item:hover { background: #f8fafc; }
        .expense-amount { font-weight: 600; color: #0f172a; }
        .expense-location { color: #475569; }
        .expense-date { color: #64748b; font-size: 0.9rem; }
        .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.2rem; padding: 5px; border-radius: 6px; transition: all 0.2s; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .delete-btn:hover { background: #fee2e2; color: #b91c1c; }
        .empty-message { text-align: center; padding: 40px 20px; color: #94a3b8; font-style: italic; }
        @media (max-width: 700px) {
            .list-header, .expense-item { grid-template-columns: 1fr; gap: 8px; padding: 15px; }
            .list-header { display: none; }
            .expense-item { border-bottom: 2px solid #e2e8f0; position: relative; }
            .delete-btn { position: absolute; top: 10px; right: 10px; }
        }
    </style>
    <!-- Importação do Firebase (versão 12.9.0) -->
    <script type="module">
        // Importações do Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        // Configuração fornecida (substitua se necessário)
        const firebaseConfig = {
            apiKey: "AIzaSyCtAZJCqrSX9gP_lkjj_L0_HvAlRbh37U4",
            authDomain: "cont-de-despesas-diario.firebaseapp.com",
            projectId: "cont-de-despesas-diario",
            storageBucket: "cont-de-despesas-diario.firebasestorage.app",
            messagingSenderId: "521480300989",
            appId: "1:521480300989:web:61943b62c82c206f094ad4"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const expensesCollection = collection(db, "despesas");

        // Estado local (cache para cálculos)
        let expenses = [];

        // Referências DOM (preenchidas quando o DOM estiver pronto)
        let form, descriptionInput, amountInput, locationInput, expenseDateInput;
        let filterDateStartInput, filterDateEndInput, clearFilterBtn, periodLabelSpan;
        let expensesContainer, dailyTotalSpan, overallTotalSpan;

        // Utilitários
        function formatDateToYYYYMMDD(date) {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getTodayDate() {
            return formatDateToYYYYMMDD(new Date());
        }

        function setDefaultDates() {
            if (!expenseDateInput) return;
            expenseDateInput.value = getTodayDate();
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"']/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return '&#039;';
            });
        }

        function formatNumber(value) {
            return Number(value).toFixed(2).replace('.', ',');
        }

        function formatDateDisplay(dateStr) {
            const [year, month, day] = dateStr.split('-');
            return `${day}/${month}/${year}`;
        }

        // Renderizar lista baseada no filtro de período
        function renderExpenses() {
            if (!filterDateStartInput || !filterDateEndInput) return;
            const dateStart = filterDateStartInput.value;
            const dateEnd = filterDateEndInput.value;
            let filteredExpenses = expenses;
            if (dateStart && dateEnd) {
                filteredExpenses = expenses.filter(exp => {
                    return exp.date >= dateStart && exp.date <= dateEnd;
                });
            }

            if (!expensesContainer) return;
            if (filteredExpenses.length === 0) {
                expensesContainer.innerHTML = `<div class="empty-message">Nenhuma despesa encontrada.</div>`;
            } else {
                // Ordenar por data decrescente e depois por id (padrão Firestore timestamp)
                const sorted = [...filteredExpenses].sort((a, b) => b.date.localeCompare(a.date) || a.id.localeCompare(b.id));
                let html = '';
                sorted.forEach(exp => {
                    html += `
                        <div class="expense-item" data-id="${exp.id}">
                            <div class="expense-description">${escapeHtml(exp.description)}</div>
                            <div class="expense-amount">R$ ${formatNumber(exp.amount)}</div>
                            <div class="expense-location">${escapeHtml(exp.location)}</div>
                            <div class="expense-date">${formatDateDisplay(exp.date)}</div>
                            <button class="delete-btn" onclick="window.deleteExpense('${exp.id}')" title="Excluir">🗑️</button>
                        </div>
                    `;
                });
                expensesContainer.innerHTML = html;
            }

            // Atualizar totais
            updateTotals(dateStart, dateEnd);
        }

        function updateTotals(dateStart, dateEnd) {
            if (!overallTotalSpan || !dailyTotalSpan || !periodLabelSpan) return;
            const overallTotal = expenses.reduce((sum, exp) => sum + Number(exp.amount), 0);
            overallTotalSpan.innerText = `R$ ${formatNumber(overallTotal)}`;

            let periodTotal = 0;
            if (dateStart && dateEnd) {
                periodLabelSpan.textContent = 'Total do período';
                periodTotal = expenses
                    .filter(exp => exp.date >= dateStart && exp.date <= dateEnd)
                    .reduce((sum, exp) => sum + Number(exp.amount), 0);
            } else {
                periodLabelSpan.textContent = 'Total do período';
                periodTotal = overallTotal;
            }
            dailyTotalSpan.innerText = `R$ ${formatNumber(periodTotal)}`;
        }

        // ===== OPERAÇÕES FIREBASE =====
        // Adicionar despesa
        async function addExpense(description, amount, location, date) {
            try {
                await addDoc(expensesCollection, {
                    description: description.trim(),
                    amount: parseFloat(amount),
                    location: location.trim(),
                    date: date,
                    createdAt: new Date().toISOString() // opcional
                });
                // Não precisamos atualizar localmente, o snapshot fará
            } catch (error) {
                console.error("Erro ao adicionar: ", error);
                alert("Erro ao salvar no Firebase. Verifique o console.");
            }
        }

        // Excluir despesa (torna-se global para ser chamada pelo onclick)
        window.deleteExpense = async function(id) {
            if (confirm("Deseja excluir esta despesa?")) {
                try {
                    await deleteDoc(doc(db, "despesas", id));
                    // O snapshot atualizará a lista
                } catch (error) {
                    console.error("Erro ao excluir: ", error);
                    alert("Erro ao excluir no Firebase.");
                }
            }
        };

        // ===== SNAPSHOT EM TEMPO REAL =====
        // Configurar query ordenada (opcional)
        const q = query(expensesCollection, orderBy("date", "desc"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            expenses = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            renderExpenses();
        }, (error) => {
            console.error("Erro no snapshot: ", error);
            alert("Falha ao carregar dados do Firebase.");
        });

        // ===== INICIALIZAÇÃO (aguardar DOM) =====
        function init() {
            form = document.getElementById('expense-form');
            descriptionInput = document.getElementById('description');
            amountInput = document.getElementById('amount');
            locationInput = document.getElementById('location');
            expenseDateInput = document.getElementById('expense-date');
            filterDateStartInput = document.getElementById('filter-date-start');
            filterDateEndInput = document.getElementById('filter-date-end');
            clearFilterBtn = document.getElementById('clear-filter');
            periodLabelSpan = document.getElementById('period-label');
            expensesContainer = document.getElementById('expenses-container');
            dailyTotalSpan = document.getElementById('daily-total');
            overallTotalSpan = document.getElementById('overall-total');

            if (!form || !expensesContainer) return;

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const description = descriptionInput.value.trim();
                const amount = amountInput.value.trim();
                const location = locationInput.value.trim();
                const date = expenseDateInput.value;

                if (!description || !amount || !location || !date) {
                    alert('Preencha todos os campos obrigatórios.');
                    return;
                }

                if (isNaN(parseFloat(amount)) || parseFloat(amount) <= 0) {
                    alert('Informe um valor válido (maior que zero).');
                    return;
                }

                addExpense(description, amount, location, date);

                descriptionInput.value = '';
                amountInput.value = '';
                locationInput.value = '';
                expenseDateInput.value = getTodayDate();
            });

            filterDateStartInput.addEventListener('change', () => { renderExpenses(); });
            filterDateEndInput.addEventListener('change', () => { renderExpenses(); });

            clearFilterBtn.addEventListener('click', () => {
                filterDateStartInput.value = '';
                filterDateEndInput.value = '';
                renderExpenses();
            });

            setDefaultDates();
            renderExpenses();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>📋 CONTROLE DE DESPESAS</h1>

        <!-- Formulário -->
        <div class="form-card">
            <form id="expense-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="description">Descrição *</label>
                        <input type="text" id="description" placeholder="Ex: Almoço" required>
                    </div>
                    <div class="form-group">
                        <label for="amount">Valor (R$) *</label>
                        <input type="number" id="amount" step="0.01" min="0.01" placeholder="0,00" required>
                    </div>
                    <div class="form-group">
                        <label for="location">Local *</label>
                        <input type="text" id="location" placeholder="Ex: Restaurante" required>
                    </div>
                    <div class="form-group">
                        <label for="expense-date">Data *</label>
                        <input type="date" id="expense-date" required>
                    </div>
                </div>
                <button type="submit" class="btn">
                    <span>➕</span> Adicionar Despesa
                </button>
            </form>
        </div>

        <!-- Filtro por período -->
        <div class="filter-section">
            <div class="filter-date">
                <label for="filter-date-start" style="display: block; margin-bottom: 6px; font-weight: 500;">📅 Data inicial</label>
                <input type="date" id="filter-date-start" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1;">
            </div>
            <div class="filter-date">
                <label for="filter-date-end" style="display: block; margin-bottom: 6px; font-weight: 500;">📅 Data final</label>
                <input type="date" id="filter-date-end" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1;">
            </div>
            <button id="clear-filter" class="btn btn-secondary">Mostrar todas</button>
        </div>

        <!-- Totais -->
        <div class="totals">
            <div class="total-box">
                <span id="period-label">Total do período</span>
                <div class="value" id="daily-total">R$ 0,00</div>
            </div>
            <div class="total-box">
                <span>Total geral</span>
                <div class="value" id="overall-total">R$ 0,00</div>
            </div>
        </div>

        <!-- Lista -->
        <div class="expenses-list">
            <div class="list-header">
                <div>Descrição</div>
                <div>Valor</div>
                <div>Local</div>
                <div>Data</div>
                <div></div>
            </div>
            <div id="expenses-container">
                <div class="empty-message">Carregando...</div>
            </div>
        </div>
    </div>
</body>
</html>
